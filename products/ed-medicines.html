<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ED Medicines | Nautical Pharma</title>

<link rel="stylesheet" href="../style.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

<header>
    <div class="container navbar">

        <div class="logo">
            <a href="../index.html">Nautical Pharma</a>
        </div>

        <nav>
            <ul>
                <li><a href="../index.html">Home</a></li>
                <li><a href="../index.html#categories">Categories</a></li>
                <li><a href="../index.html#contact">Contact</a></li>
            </ul>
        </nav>

    </div>
</header>

<section class="section" style="padding-top:140px;">

<div class="container">

<h2>ED Medicines</h2>

<p style="margin-bottom:30px;">
Browse our complete range of Erectile Dysfunction medicines.
</p>

<div class="toolbar">

    <input
        type="text"
        id="searchInput"
        placeholder="🔍 Search ED Medicines...">

    <select id="categoryFilter">
        <option value="">All Generics</option>
        <option>Sildenafil</option>
        <option>Tadalafil</option>
        <option>Vardenafil</option>
        <option>Avanafil</option>
    </select>

</div>

<div class="product-grid" id="productGrid">

</div>

</div>

</section>

<script src="ed-products.js"></script>
<script src="../script.js"></script>
<script>

const grid = document.getElementById("productGrid");

function displayProducts(){

grid.innerHTML = "";

products.forEach(product => {

grid.innerHTML += `

<div class="product-card">

<img src="${product.image}" alt="${product.name}">

<h3>${product.name}</h3>

<p><b>Generic:</b> ${product.generic}</p>

<p><b>Strength:</b> ${product.strength}</p>

<p><b>Packing:</b> ${product.packing}</p>

<p><b>Manufacturer:</b> ${product.manufacturer}</p>

<a href="https://docs.google.com/forms/d/e/1FAIpQLSdfMsIqbKJQlSclhLTOwSiU7SaShe-y_R9y6r875sU-gO9jkg/viewform?usp=header" class="quote-btn" target="_blank">
Request Quote
</a>

</div>

`;

});

}

displayProducts();

</script>
</body>
</html>
